# =====================================================
# nlp-nets Compiler Configuration Example
# =====================================================
# This configuration demonstrates how to compile a
# pre-trained model for production inference.
#
# Usage:
#   python -c "
#     import torch, yaml
#     from models.builder import build_model
#     from compiler.builder import build_compiler
#
#     with open('configs/compiler_example.yaml') as f:
#         opts = yaml.safe_load(f)
#     model = build_model(opts)
#     model.eval()
#
#     compiler = build_compiler(opts, model)
#     example_input = torch.randint(0, opts['model']['vocab_size'], (1, 64))
#     compiler.compile(example_input=example_input)
#     compiler.save('compiled_model.onnx')
#   "
# =====================================================

seed: 42

# ---- Task ----
task:
  type: "mlm"

# ---- Model ----
model:
  name: "bert-tiny"
  vocab_size: 30522
  hidden_size: 128
  num_hidden_layers: 2
  num_attention_heads: 4
  intermediate_size: 512
  hidden_dropout_prob: 0.1
  attention_probs_dropout_prob: 0.1
  max_position_embeddings: 128
  type_vocab_size: 2
  pad_token_id: 0
  layer_norm_eps: 1.0e-12

# ---- Compiler ----
compiler:
  # Backend selection: torchscript | onnx | torch_compile | quantize
  backend: "onnx"

  # TorchScript-specific options
  torchscript:
    mode: "trace"              # trace | script
    strict: true
    check_trace: true

  # ONNX-specific options
  onnx:
    opset_version: 17
    input_names: ["input_ids", "attention_mask"]
    output_names: ["logits"]
    dynamic_axes:
      0: "batch_size"
      1: "seq_length"
    export_fp16: false

  # torch.compile-specific options
  torch_compile:
    backend: "inductor"        # inductor | cudagraphs | fx2trt
    mode: null                 # null | reduce-overhead | max-autotune
    fullgraph: false
    dynamic: false

  # Quantization options
  quantization:
    mode: "dynamic"            # dynamic | static | fp16
    dtype: "qint8"
    backend: "x86"             # x86 | fbgemm | qnnpack
