# =====================================================
# nlp-nets Demo Configuration
# =====================================================
# This is a minimal working configuration for training
# a BERT model on WikiText-2 with Masked Language Modeling.
# =====================================================

seed: 42

# ---- Task ----
task:
  type: "mlm"                # mlm | causal_lm | seq_class | seq2seq
  loss: "cross_entropy"

# ---- Model ----
model:
  name: "bert-base"
  vocab_size: 30522
  hidden_size: 768
  num_hidden_layers: 12
  num_attention_heads: 12
  intermediate_size: 3072
  hidden_dropout_prob: 0.1
  attention_probs_dropout_prob: 0.1
  max_position_embeddings: 512
  type_vocab_size: 2
  pad_token_id: 0
  layer_norm_eps: 1.0e-12

# ---- Dataset ----
dataset:
  name: "wikitext-2"         # wikitext-2 | wikitext-103 | imdb | sst2
  max_seq_length: 128
  num_workers: 2

# ---- Tokenizer ----
tokenizer:
  pretrained_model_name: "bert-base-uncased"
  max_length: 128

# ---- Training ----
train:
  batch_size: 16
  epochs: 3
  device: "cuda"              # cuda | cpu
  gradient_accumulation_steps: 1
  max_grad_norm: 1.0
  use_amp: true
  log_interval: 10
  save_every: 1000
  output_dir: "checkpoints"

# ---- Optimizer ----
optim:
  name: "adamw"
  lr: 2.0e-5
  weight_decay: 0.01
  beta1: 0.9
  beta2: 0.999
  eps: 1.0e-8
  scheduler:
    name: "linear_warmup"
    warmup_ratio: 0.06
